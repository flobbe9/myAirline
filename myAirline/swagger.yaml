swagger: '2.0'
info:
  description: Api Documentation
  version: '1.0'
  title: Api Documentation
  termsOfService: urn:tos
  contact: {}
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0
host: localhost:4002
basePath: /
tags:
  - name: app-user-controller
    description: App User Controller
  - name: basic-error-controller
    description: Basic Error Controller
  - name: generic-controller
    description: Generic Controller
paths:
  /:
    get:
      tags:
        - generic-controller
      summary: getIndexPage
      operationId: getIndexPageUsingGET
      produces:
        - '*/*'
      responses:
        '200':
          description: OK
          schema:
            type: string
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
  /appUser/addNew:
    post:
      tags:
        - app-user-controller
      summary: addNew
      operationId: addNewUsingPOST
      consumes:
        - application/json
      produces:
        - '*/*'
      parameters:
        - in: body
          name: appUser
          description: appUser
          required: true
          schema:
            $ref: '#/definitions/AppUserReq'
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/AppUserRes'
        '201':
          description: Created
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
  /appUser/confirmAccount/{token}:
    get:
      tags:
        - app-user-controller
      summary: confirmAccount
      operationId: confirmAccountUsingGET
      produces:
        - '*/*'
      parameters:
        - name: token
          in: path
          description: token
          required: true
          type: string
      responses:
        '200':
          description: Confirmed
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
  /appUser/getByUserName:
    get:
      tags:
        - app-user-controller
      summary: getByUserName
      operationId: getByUserNameUsingGET
      produces:
        - '*/*'
      parameters:
        - name: userName
          in: query
          description: userName
          required: true
          type: string
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/AppUserRes'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
  /error:
    get:
      tags:
        - basic-error-controller
      summary: errorHtml
      operationId: errorHtmlUsingGET
      produces:
        - text/html
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/ModelAndView'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
    head:
      tags:
        - basic-error-controller
      summary: errorHtml
      operationId: errorHtmlUsingHEAD
      consumes:
        - application/json
      produces:
        - text/html
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/ModelAndView'
        '204':
          description: No Content
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
    post:
      tags:
        - basic-error-controller
      summary: errorHtml
      operationId: errorHtmlUsingPOST
      consumes:
        - application/json
      produces:
        - text/html
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/ModelAndView'
        '201':
          description: Created
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
    put:
      tags:
        - basic-error-controller
      summary: errorHtml
      operationId: errorHtmlUsingPUT
      consumes:
        - application/json
      produces:
        - text/html
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/ModelAndView'
        '201':
          description: Created
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
    delete:
      tags:
        - basic-error-controller
      summary: errorHtml
      operationId: errorHtmlUsingDELETE
      produces:
        - text/html
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/ModelAndView'
        '204':
          description: No Content
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
    options:
      tags:
        - basic-error-controller
      summary: errorHtml
      operationId: errorHtmlUsingOPTIONS
      consumes:
        - application/json
      produces:
        - text/html
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/ModelAndView'
        '204':
          description: No Content
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
    patch:
      tags:
        - basic-error-controller
      summary: errorHtml
      operationId: errorHtmlUsingPATCH
      consumes:
        - application/json
      produces:
        - text/html
      responses:
        '200':
          description: OK
          schema:
            $ref: '#/definitions/ModelAndView'
        '204':
          description: No Content
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
definitions:
  AppUserReq:
    type: object
    properties:
      age:
        type: integer
        format: int32
      birthday:
        type: string
        format: date
      email:
        type: string
      firstName:
        type: string
      id:
        type: integer
        format: int64
      isAccountNonExpired:
        type: boolean
      isAccountNonLocked:
        type: boolean
      isCredentialsNonExpired:
        type: boolean
      isEnabled:
        type: boolean
      lastName:
        type: string
      password:
        type: string
      role:
        type: string
        enum:
          - ADMIN
          - USER
    title: AppUserReq
  AppUserRes:
    type: object
    properties:
      accountNonExpired:
        type: boolean
      accountNonLocked:
        type: boolean
      age:
        type: integer
        format: int32
      authorities:
        type: array
        items:
          $ref: '#/definitions/GrantedAuthority'
      birthday:
        type: string
        format: date
      credentialsNonExpired:
        type: boolean
      email:
        type: string
      enabled:
        type: boolean
      firstName:
        type: string
      id:
        type: integer
        format: int64
      isAccountNonExpired:
        type: boolean
      isAccountNonLocked:
        type: boolean
      isCredentialsNonExpired:
        type: boolean
      isEnabled:
        type: boolean
      lastName:
        type: string
      password:
        type: string
      role:
        type: string
        enum:
          - ADMIN
          - USER
      username:
        type: string
    title: AppUserRes
  GrantedAuthority:
    type: object
    properties:
      authority:
        type: string
    title: GrantedAuthority
  ModelAndView:
    type: object
    properties:
      empty:
        type: boolean
      model:
        type: object
      modelMap:
        type: object
        additionalProperties:
          type: object
      reference:
        type: boolean
      status:
